<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtCorners Design</title>
    <link rel="icon" type="image/png" href="assets/images/icon sizes_512 px (1).png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --red-dark: #91101a;
        --red-mid: #bc1d25;
        --red-light: #d8262d;
        --black: #161616;
        --grey: #666666;
        --white: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: var(--black);
        font-family: "Cairo", sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 50% at 50% -10%,
            rgba(145, 16, 26, 0.45) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 100%,
            rgba(188, 29, 37, 0.25) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          repeating-linear-gradient(
            135deg,
            rgba(145, 16, 26, 0.06) 0px,
            rgba(145, 16, 26, 0.06) 1px,
            transparent 1px,
            transparent 40px
          ),
          repeating-linear-gradient(
            45deg,
            rgba(145, 16, 26, 0.06) 0px,
            rgba(145, 16, 26, 0.06) 1px,
            transparent 1px,
            transparent 40px
          );
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        padding: 48px 24px 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* LOGO */
      .logo-wrap {
        position: relative;
        margin-bottom: 20px;
        animation: fadeDown 0.8s ease both;
      }

      .logo-ring {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 2.5px solid var(--red-mid);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        box-shadow:
          0 0 32px rgba(188, 29, 37, 0.35),
          0 0 0 6px rgba(145, 16, 26, 0.12);
        overflow: hidden;
        padding: 12px;
      }

      .logo-ring img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .logo-tri {
        position: absolute;
        bottom: -14px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-top: 12px solid var(--red-mid);
      }

      /* NAME */
      .brand-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.4rem;
        letter-spacing: 3px;
        color: var(--white);
        margin-top: 24px;
        margin-bottom: 4px;
        animation: fadeDown 0.9s ease both;
      }

      .brand-name span {
        color: var(--red-light);
      }

      .brand-tagline {
        font-size: 0.78rem;
        color: var(--grey);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 36px;
        animation: fadeDown 1s ease both;
      }

      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--red-mid),
          transparent
        );
        margin-bottom: 32px;
        animation: fadeIn 1.1s ease both;
      }

      /* LINKS */
      .links {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 36px;
      }

      .link-btn {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 22px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--white);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
        transition:
          background 0.25s,
          border-color 0.25s,
          transform 0.2s;
        animation: slideUp 0.6s ease both;
      }

      .link-btn:nth-child(1) {
        animation-delay: 0.2s;
      }
      .link-btn:nth-child(2) {
        animation-delay: 0.3s;
      }
      .link-btn:nth-child(3) {
        animation-delay: 0.4s;
      }
      .link-btn:nth-child(4) {
        animation-delay: 0.5s;
      }
      .link-btn:nth-child(5) {
        animation-delay: 0.6s;
      }

      .link-btn::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--red-light), var(--red-dark));
        transform: scaleY(0);
        transition: transform 0.25s;
        transform-origin: bottom;
      }

      .link-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(188, 29, 37, 0.12) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.25s;
      }

      .link-btn:hover {
        background: rgba(188, 29, 37, 0.1);
        border-color: rgba(188, 29, 37, 0.4);
        transform: translateX(-4px);
      }

      .link-btn:hover::before {
        transform: scaleY(1);
      }
      .link-btn:hover::after {
        opacity: 1;
      }

      .link-icon {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--red-dark), var(--red-mid));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(145, 16, 26, 0.4);
      }

      .link-label {
        flex: 1;
      }

      .link-arrow {
        color: var(--grey);
        font-size: 0.8rem;
        transition:
          color 0.25s,
          transform 0.25s;
      }

      .link-btn:hover .link-arrow {
        color: var(--red-light);
        transform: translateX(-4px);
      }

      /* MAP */
      .section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.1rem;
        letter-spacing: 3px;
        color: var(--grey);
        text-transform: uppercase;
        margin-bottom: 14px;
        align-self: center;
        animation: fadeIn 1s ease both;
      }

      .map-wrap {
        width: 100%;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid rgba(188, 29, 37, 0.25);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        margin-bottom: 40px;
        animation: fadeIn 1.1s ease both;
        position: relative;
      }

      .map-wrap iframe {
        width: 100%;
        height: 220px;
        display: block;
        border: none;
        filter: grayscale(1) invert(1) contrast(0.85) brightness(0.75)
          sepia(0.2);
      }

      .map-overlay {
        position: absolute;
        inset: 0;
        background: rgba(145, 16, 26, 0.08);
        pointer-events: none;
      }

      /* SOCIAL ICONS */
      .socials {
        display: flex;
        gap: 18px;
        margin-bottom: 32px;
        animation: fadeIn 1.2s ease both;
      }

      .social-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--grey);
        font-size: 1.1rem;
        text-decoration: none;
        transition:
          border-color 0.2s,
          color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
      }

      .social-icon:hover {
        border-color: var(--red-mid);
        color: var(--white);
        transform: translateY(-3px);
        box-shadow: 0 6px 18px rgba(188, 29, 37, 0.35);
      }

      /* FOOTER */
      .footer {
        font-size: 0.72rem;
        color: rgba(102, 102, 102, 0.5);
        letter-spacing: 1px;
        text-transform: uppercase;
        animation: fadeIn 1.3s ease both;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
